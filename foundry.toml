[profile.default]

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

solc = "0.8.25"
optimizer = true
# `optimizer_runs` is a runtime-gas vs deploy-bytecode tradeoff: high values
# inline aggressively for fast runtime at the cost of deployed bytecode size.
# StoxReceiptVault is at the EIP-170 24,576-byte limit. 24483 is the highest
# value found by empirical binary search (legacy pipeline; via_ir was tried
# in #144 and made the vault larger) where StoxReceiptVault stays under
# EIP-170. 24484 trips the limit. Re-run the search if vault source changes
# or the dependency tree's bytecode shifts under us; the boundary is
# sensitive and not stable across compiler versions or refactors.
optimizer_runs = 24483

evm_version = "cancun"

bytecode_hash = "none"
cbor_metadata = false

fs_permissions = [{ access = "read-write", path = "src/generated" }]

remappings = [
  "rain.vats/=lib/rain.vats/src/",
  "rain.factory/=lib/rain.vats/lib/rain.factory/src/",
  "openzeppelin-contracts-upgradeable/=lib/rain.vats/lib/openzeppelin-contracts-upgradeable/",
  "rain.deploy/=lib/rain.deploy/src/",
  "rain.sol.codegen/=lib/rain.vats/lib/rain.flare/lib/rain.interpreter/lib/rain.interpreter.interface/lib/rain.sol.codegen/src/",
  "rain.math.float/=lib/rain.vats/lib/rain.flare/lib/rain.interpreter/lib/rain.interpreter.interface/lib/rain.math.float/src/",
  "rain.tofu.erc20-decimals/=lib/rain.tofu.erc20-decimals/src/",
]

[rpc_endpoints]
arbitrum = "${CI_DEPLOY_ARBITRUM_RPC_URL}"
base = "${CI_DEPLOY_BASE_RPC_URL}"
base_sepolia = "${CI_DEPLOY_BASE_SEPOLIA_RPC_URL}"
flare = "${CI_DEPLOY_FLARE_RPC_URL}"
polygon = "${CI_DEPLOY_POLYGON_RPC_URL}"

[etherscan]
arbitrum = { key = "${CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY}" }
base = { key = "${CI_DEPLOY_BASE_ETHERSCAN_API_KEY}" }
base_sepolia = { key = "${CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY}" }
flare = { key = "${CI_DEPLOY_FLARE_ETHERSCAN_API_KEY}" }
polygon = { key = "${CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY}" }
