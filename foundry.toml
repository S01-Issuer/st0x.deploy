# Soldeer package identity. `version` here is the NEXT, in-development release —
# the version this branch's work generates into `src/generated/<tag>/` and
# deploys (see issue #244). On merge, `rainix-autopublish` publishes this version
# and bumps to the next, regenerating the deploy libs so the bump commit is born
# clean. So this holds the next unpublished version, not the last published one.
[package]
name = "st0x-deploy"
version = "0.1.28"

[profile.default]
libs = ['dependencies']

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

solc = "0.8.25"
optimizer = true
# `optimizer_runs` is a runtime-gas vs deploy-bytecode tradeoff: higher values
# inline aggressively for faster runtime at the cost of larger deployed
# bytecode. StoxReceiptVault is the contract that binds against the EIP-170
# 24,576-byte runtime limit; 5000 keeps it under the limit while the rest of
# the suite stays well clear. The margin is thin and sensitive to vault source
# changes and dependency-tree bytecode shifts — re-check StoxReceiptVault's
# `forge build --sizes` runtime margin on any such change. via_ir is OFF (tried
# in #144, made the vault larger for this inheritance shape).
optimizer_runs = 5000

evm_version = "cancun"

bytecode_hash = "none"
cbor_metadata = false

fs_permissions = [
  { access = "read-write", path = "src/generated" },
  # `BuildPointers` reads the canonical release version from `[package].version`
  # here to name the `src/generated/<tag>/` snapshot and generate the deploy tag.
  { access = "read", path = "foundry.toml" },
  # `out` is needed by the RAI-296 multisig migration script and its tests:
  # the script writes the Safe Tx Builder JSON artifact under `out/`, and
  # the LibSafeOps round-trip tests round-trip the JSON through disk.
  { access = "read-write", path = "out" },
]

remappings = [
  # Third-party soldeer dep whose own source uses unversioned import
  # prefixes; bridge to its actual install location so transitive
  # resolution works. Tracked upstream:
  # - OpenZeppelin/openzeppelin-contracts-upgradeable#232
  "@openzeppelin/contracts/=dependencies/@openzeppelin-contracts-5.6.1/",
]

[dependencies]
forge-std = "1.16.1"
"@openzeppelin-contracts" = "5.6.1"
"@openzeppelin-contracts-upgradeable" = "5.6.1"
"rain-deploy" = "0.1.4"
"rain-extrospection" = "0.1.1"
"rain-factory" = "0.1.1"
"rain-math-fixedpoint" = "0.2.0"
"rain-math-float" = "0.1.1"
"rain-sol-codegen" = "0.1.0"
"rain-solmem" = "0.1.3"
"rain-tofu-erc20-decimals" = "0.1.1"
"rain-vats" = "0.1.6"
"rain-verify-interface" = "0.1.0"

[soldeer]
recursive_deps = false

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
ethereum = "${ETHEREUM_RPC_URL}"
flare = "${FLARE_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"

[etherscan]
arbitrum = { key = "${CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY}" }
base = { key = "${CI_DEPLOY_BASE_ETHERSCAN_API_KEY}" }
base_sepolia = { key = "${CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY}" }
# `ethereum` is not a built-in foundry chain alias (foundry's canonical name for
# chain 1 is `mainnet`), so the chain id is pinned explicitly. Without it,
# verification fails with "unknown alias `ethereum`".
ethereum = { key = "${CI_DEPLOY_ETHEREUM_ETHERSCAN_API_KEY}", chain = 1 }
flare = { key = "${CI_DEPLOY_FLARE_ETHERSCAN_API_KEY}" }
polygon = { key = "${CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY}" }
