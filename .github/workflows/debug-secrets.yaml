name: Debug fork secrets
on: [push]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Probe RPC_URL_*_FORK secret lengths
        env:
          ARBITRUM: ${{ secrets.RPC_URL_ARBITRUM_FORK }}
          BASE: ${{ secrets.RPC_URL_BASE_FORK }}
          BASE_SEPOLIA: ${{ secrets.RPC_URL_BASE_SEPOLIA_FORK }}
          FLARE: ${{ secrets.RPC_URL_FLARE_FORK }}
          POLYGON: ${{ secrets.RPC_URL_POLYGON_FORK }}
        run: |
          echo "ARBITRUM length: ${#ARBITRUM}"
          echo "BASE length: ${#BASE}"
          echo "BASE_SEPOLIA length: ${#BASE_SEPOLIA}"
          echo "FLARE length: ${#FLARE}"
          echo "POLYGON length: ${#POLYGON}"
