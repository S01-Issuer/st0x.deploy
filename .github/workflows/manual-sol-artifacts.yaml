name: Manual sol artifacts
on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to deploy (one contract per suite, deploy in listed order)'
        required: true
        type: choice
        options:
          # ===================================================================
          # One suite per contract. Suite ids carry no version — the deploy
          # script handles versioning and always deploys the current source,
          # asserting the current release's pins. Deploy in the listed order;
          # later entries reference earlier ones via dependency pointers so an
          # out-of-order run trips the dep-codehash check.
          # ===================================================================
          # 1. Implementations and beacons with no on-chain dependencies, plus
          #    the wrapped-token-vault chain (vault -> beacon -> beacon-set
          #    deployer) and the two authorizers.
          - stox-receipt
          - stox-wrapped-token-vault
          - stox-wrapped-token-vault-beacon
          - stox-wrapped-token-vault-beacon-set-deployer
          - stox-offchain-asset-receipt-vault-authorizer-v1
          - stox-offchain-asset-receipt-vault-payment-mint-authorizer-v1
          # 2. Corporate-actions facet (no on-chain dependencies — the
          #    receipt-vault impl hardcodes its address but doesn't link to it
          #    at deploy time).
          - stox-corporate-actions-facet
          # 3. Receipt vault (no on-chain dependencies).
          - stox-receipt-vault
          # 4. OARV beacon-set deployer (depends on the receipt and
          #    receipt-vault impls above).
          - stox-offchain-asset-receipt-vault-beacon-set-deployer
          # 5. Unified deployer (depends on the two set-deployers above).
          - stox-unified-deployer
          # 6. Orchestrator (no on-chain dependencies) and its beacon-set
          #    deployer (depends on the orchestrator impl).
          - st0x-orchestrator
          - st0x-orchestrator-beacon-set-deployer
jobs:
  deploy:
    uses: rainlanguage/rainix/.github/workflows/rainix-manual-sol-artifacts.yaml@main
    with:
      suite: ${{ inputs.suite }}
    # The reusable workflow lives in a different org (rainlanguage), so
    # `secrets: inherit` does not forward this repo's secrets to it — they must
    # be passed explicitly. Only the secrets this repo actually holds are
    # listed; the reusable workflow declares the full set as optional and falls
    # back to `|| vars.* || ''` for any it isn't given.
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      RPC_URL_ARBITRUM_FORK: ${{ secrets.RPC_URL_ARBITRUM_FORK }}
      RPC_URL_BASE_FORK: ${{ secrets.RPC_URL_BASE_FORK }}
      RPC_URL_BASE_SEPOLIA_FORK: ${{ secrets.RPC_URL_BASE_SEPOLIA_FORK }}
      RPC_URL_ETHEREUM_FORK: ${{ secrets.RPC_URL_ETHEREUM_FORK }}
      RPC_URL_FLARE_FORK: ${{ secrets.RPC_URL_FLARE_FORK }}
      RPC_URL_POLYGON_FORK: ${{ secrets.RPC_URL_POLYGON_FORK }}
      CI_DEPLOY_BASE_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_BASE_ETHERSCAN_API_KEY }}
      CI_DEPLOY_ETHEREUM_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_ETHEREUM_ETHERSCAN_API_KEY }}
